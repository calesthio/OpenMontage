# Copy to 20-secrets.yaml, fill in real values, and DO NOT commit that copy.
# Rotate the ElevenLabs key that is currently committed in
# circuit-bid/.ddev/docker-compose.narrator.yaml before using it here.
---
apiVersion: v1
kind: Secret
metadata:
  name: ttsd-secret
  namespace: tutorial-render
type: Opaque
stringData:
  # The narration voice per language (the ttsd sidecar picks by the recipe lang).
  ELEVENLABS_API_KEY: "sk_REPLACE_ME"
  ELEVENLABS_VOICE_IDS: "en:REPLACE_VOICE_ID"
  ELEVENLABS_MODEL_ID: "eleven_multilingual_v2"
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: tutorial-render
type: Opaque
stringData:
  # Consumed by BOTH the worker (upload) and the render-api (presign).
  MINIO_ENDPOINT: "minio.tutorial-render.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "REPLACE_ME"
  MINIO_SECRET_KEY: "REPLACE_ME"
  MINIO_SECURE: "false"
