services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openmontage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmontage}
      POSTGRES_DB: ${POSTGRES_DB:-openmontage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openmontage}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./projects:/app/projects
      - ./tools:/app/tools
      - ./lib:/app/lib
      - ./skills:/app/skills
      - ./pipeline_defs:/app/pipeline_defs
      - ./schemas:/app/schemas
      - ./styles:/app/styles
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVER_URL=http://server:8000
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
